<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: 'Segoe UI', Arial, sans-serif;
color:#0f172a;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:15px;
color:#1e3a8a;
font-weight:800;
}

label{
font-weight:700;
font-size:13px;
color:#334155;
margin-top:10px;
display:block;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #cbd5f5;
margin-bottom:15px;
font-size:16px;
font-weight:600;
background:#f8fafc;
}

.table{
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}

.row:last-child{
border:none;
}

.item{
font-size:15px;
font-weight:600;
}

input[type="number"]{
width:80px;
padding:8px;
border-radius:10px;
border:1px solid #cbd5f5;
text-align:center;
font-size:16px;
font-weight:600;
background:#f8fafc;
}

input[type="file"]{
width:100%;
margin-bottom:10px;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
display:none;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:linear-gradient(135deg,#1e3a8a,#3b82f6);
color:white;
border:none;
border-radius:12px;
margin-top:20px;
font-weight:700;
}

button:disabled{
background:gray;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>Input Jajan</h2>

<!-- ✅ FOTO DI ATAS -->
<label>Foto Laporan</label>
<input type="file" id="foto" accept="image/*" capture="environment">
<img id="preview">

<label>Jenis</label>
<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<label>Tempat</label>
<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div class="table">

<div class="row"><span class="item">Tahu Batagor</span><input type="number" id="tahu_batagor"></div>
<div class="row"><span class="item">Cilok</span><input type="number" id="cilok"></div>
<div class="row"><span class="item">Cimol Cireng</span><input type="number" id="cimol_cireng"></div>
<div class="row"><span class="item">Kripik Kolek</span><input type="number" id="kripik_kolek"></div>
<div class="row"><span class="item">Piscok Molen</span><input type="number" id="piscok_molen"></div>
<div class="row"><span class="item">Dimsum Maklor Moci</span><input type="number" id="dimsum_maklor_moci"></div>
<div class="row"><span class="item">Kebab</span><input type="number" id="kebab"></div>
<div class="row"><span class="item">Sosis Roti Gurita</span><input type="number" id="sosis_roti_gurita"></div>

</div>

<button id="tombol" onclick="kirim()">Simpan</button>

</div>
</div>

<script>

// ✅ PREVIEW FOTO
document.getElementById("foto").addEventListener("change", function(e){
  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();
  reader.onload = function(ev){
    let img = document.getElementById("preview");
    img.src = ev.target.result;
    img.style.display = "block";
  }
  reader.readAsDataURL(file);
});

// ✅ KOMPRES GAMBAR
function kompresGambar(file){
  return new Promise((resolve)=>{
    let reader = new FileReader();
    reader.onload = function(e){
      let img = new Image();
      img.src = e.target.result;

      img.onload = function(){
        let canvas = document.createElement("canvas");
        let maxWidth = 400;

        let scale = maxWidth / img.width;
        canvas.width = maxWidth;
        canvas.height = img.height * scale;

        let ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,canvas.width,canvas.height);

        let base64 = canvas.toDataURL("image/jpeg",0.5);
        resolve(base64);
      }
    }
    reader.readAsDataURL(file);
  });
}

async function kirim(){

var tombol=document.getElementById("tombol");
if(tombol.disabled) return;

tombol.innerText="Mengirim...";
tombol.disabled=true;

var tempat=document.getElementById("tempat").value;
var jenis=document.getElementById("jenis").value;

let items = [];

function tambah(nama,id){
  let val = document.getElementById(id).value;
  if(val && val != 0){
    items.push({barang:nama,jumlah:val});
  }
}

tambah("Tahu Batagor","tahu_batagor");
tambah("Cilok","cilok");
tambah("Cimol Cireng","cimol_cireng");
tambah("Kripik Kolek","kripik_kolek");
tambah("Piscok Molen","piscok_molen");
tambah("Dimsum Maklor Moci","dimsum_maklor_moci");
tambah("Kebab","kebab");
tambah("Sosis Roti Gurita","sosis_roti_gurita");

// ✅ FOTO
let fotoInput = document.getElementById("foto");
let fotoBase64 = "";

try{
  if(fotoInput.files.length > 0){
    fotoBase64 = await kompresGambar(fotoInput.files[0]);
  }

  let data = {
    waktu: new Date().toLocaleString("sv-SE", { timeZone: "Asia/Jakarta" }),
    tempat: tempat,
    jenis: jenis,
    items: items,
    foto: fotoBase64
  };

  await db.ref("jajan").push(data);

  alert("Data berhasil tersimpan");

  kosongkan();

}catch(e){
  alert("Gagal mengirim, cek koneksi");
}

tombol.innerText="Simpan";
tombol.disabled=false;

}

function kosongkan(){
document.querySelectorAll("input[type=number]").forEach(i=>i.value="");
document.getElementById("foto").value="";
document.getElementById("preview").style.display="none";
}

</script>
