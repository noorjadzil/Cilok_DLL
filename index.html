<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}
.container{max-width:420px;margin:auto;padding:10px;}
.card{background:white;border-radius:16px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.tabs{display:flex;background:#1e3a8a;border-radius:12px 12px 0 0;overflow:hidden;margin-bottom:10px;}
.tab-btn{flex:1;padding:12px;border:none;background:transparent;color:white;font-weight:700;}
.tab-btn.active{background:#3b82f6;}
h2{text-align:center;color:#1e3a8a;}
label{font-weight:700;font-size:13px;margin-top:8px;display:block;}
select,input[type="number"]{width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5f5;margin-bottom:10px;font-weight:600;}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:8px 0;}
.row input{width:80px;}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#1e3a8a;color:white;font-weight:700;margin-top:10px;}
img{width:100%;border-radius:10px;margin-top:8px;}
.laporan-card{background:white;margin-top:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showTab('input',event)">Input</button>
<button class="tab-btn" onclick="showTab('laporan',event)">Laporan</button>
</div>

<div class="card">

<!-- INPUT -->
<div id="inputTab">
<h2>Input Jajan</h2>

<div id="loginArea">
<button onclick="login()">Login Admin</button>
</div>

<div id="formArea" style="display:none">

<button onclick="logout()">Logout</button>

<label>Foto</label>
<input type="file" id="foto" accept="image/*" capture="environment">
<img id="preview" style="display:none">

<label>Jenis</label>
<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<label>Tempat</label>
<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div class="row"><span>Tahu Batagor</span><input type="number" id="tahu_batagor"></div>
<div class="row"><span>Cilok</span><input type="number" id="cilok"></div>
<div class="row"><span>Cimol Cireng</span><input type="number" id="cimol_cireng"></div>
<div class="row"><span>Kripik Kolek</span><input type="number" id="kripik_kolek"></div>
<div class="row"><span>Piscok Molen</span><input type="number" id="piscok_molen"></div>
<div class="row"><span>Dimsum Maklor Moci</span><input type="number" id="dimsum_maklor_moci"></div>
<div class="row"><span>Kebab</span><input type="number" id="kebab"></div>
<div class="row"><span>Sosis Roti Gurita</span><input type="number" id="sosis_roti_gurita"></div>

<button id="tombol" onclick="kirim()">Simpan</button>

</div>
</div>

<!-- LAPORAN -->
<div id="laporanTab" style="display:none">
<h2>Laporan</h2>
<div id="listLaporan">Loading...</div>
</div>

</div>
</div>

<script>

// ================= ADMIN =================
const ADMIN_EMAIL = "noor.jadzil@gmail.com";

// ================= TAB =================
function showTab(tab,e){
document.getElementById("inputTab").style.display = tab==="input"?"block":"none";
document.getElementById("laporanTab").style.display = tab==="laporan"?"block":"none";

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

if(tab==="laporan") loadLaporan();
}

// ================= LOGIN =================
function login(){
const provider = new firebase.auth.GoogleAuthProvider();
firebase.auth().signInWithPopup(provider);
}

function logout(){
firebase.auth().signOut();
}

// ================= AUTO LOGIN =================
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

firebase.auth().onAuthStateChanged(user=>{
if(user && user.email===ADMIN_EMAIL){
document.getElementById("loginArea").style.display="none";
document.getElementById("formArea").style.display="block";
}else{
document.getElementById("loginArea").style.display="block";
document.getElementById("formArea").style.display="none";
}
});

// ================= FOTO =================
document.getElementById("foto").addEventListener("change",function(e){
let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=function(ev){
let img=document.getElementById("preview");
img.src=ev.target.result;
img.style.display="block";
}
reader.readAsDataURL(file);
});

function kompresGambar(file){
return new Promise(resolve=>{
let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.src=e.target.result;

img.onload=function(){
let canvas=document.createElement("canvas");
let scale=400/img.width;
canvas.width=400;
canvas.height=img.height*scale;

let ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve(canvas.toDataURL("image/jpeg",0.5));
}
}
reader.readAsDataURL(file);
});
}

// ================= KIRIM =================
async function kirim(){

let user = firebase.auth().currentUser;
if(!user || user.email!==ADMIN_EMAIL){
alert("Bukan admin!");
return;
}

let tombol=document.getElementById("tombol");
if(tombol.disabled) return;

tombol.innerText="Mengirim...";
tombol.disabled=true;

let items=[];

function tambah(nama,id){
let val=document.getElementById(id).value;
if(val && val!=0){
items.push({barang:nama,jumlah:val});
}
}

tambah("Tahu Batagor","tahu_batagor");
tambah("Cilok","cilok");
tambah("Cimol Cireng","cimol_cireng");
tambah("Kripik Kolek","kripik_kolek");
tambah("Piscok Molen","piscok_molen");
tambah("Dimsum Maklor Moci","dimsum_maklor_moci");
tambah("Kebab","kebab");
tambah("Sosis Roti Gurita","sosis_roti_gurita");

let fotoBase64="";
let fotoInput=document.getElementById("foto");

if(fotoInput.files.length>0){
fotoBase64=await kompresGambar(fotoInput.files[0]);
}

let data={
waktu:new Date().toLocaleString("sv-SE",{timeZone:"Asia/Jakarta"}),
tempat:document.getElementById("tempat").value,
jenis:document.getElementById("jenis").value,
items:items,
foto:fotoBase64
};

try{
await db.ref("jajan").push(data);
alert("Berhasil");
kosongkan();
}catch(e){
alert("Gagal");
}

tombol.innerText="Simpan";
tombol.disabled=false;
}

// ================= LAPORAN =================
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

let arr=Object.values(snap.val()).reverse();

arr.forEach(d=>{
let items=d.items.map(i=>`${i.barang} (${i.jumlah})`).join(", ");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<b>${d.jenis} - ${d.tempat}</b><br>
<small>${d.waktu}</small><br>
${items}<br>
${d.foto?`<img src="${d.foto}">`:""}
`;

list.appendChild(div);
});

});
}

// ================= RESET =================
function kosongkan(){
document.querySelectorAll("input[type=number]").forEach(i=>i.value="");
document.getElementById("foto").value="";
document.getElementById("preview").style.display="none";
}

</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

projectId:"cilok-86ced"

const db=firebase.database();
</script>

</body>
</html>
