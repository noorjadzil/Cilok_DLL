<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:'Segoe UI',Arial;margin:0;background:linear-gradient(135deg,#0f172a,#1e3a8a);}
.container{max-width:420px;margin:auto;padding:10px;}
.card{background:white;border-radius:16px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.tabs{display:flex;background:#1e3a8a;border-radius:12px 12px 0 0;overflow:hidden;margin-bottom:10px;}
.tab-btn{flex:1;padding:12px;border:none;background:transparent;color:white;font-weight:700;}
.tab-btn.active{background:#3b82f6;}
h2{text-align:center;color:#1e3a8a;}
label{font-weight:700;font-size:13px;margin-top:8px;display:block;}
select,input[type="number"]{width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5f5;margin-bottom:10px;font-weight:600;}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:8px 0;}
.row input{width:80px;}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#1e3a8a;color:white;font-weight:700;margin-top:10px;}
img{width:100%;border-radius:10px;margin-top:8px;}
.laporan-card{background:white;margin-top:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showTab('input',event)">Input</button>
<button class="tab-btn" onclick="showTab('laporan',event)">Laporan</button>
</div>

<div class="card">

<!-- INPUT -->
<div id="inputTab">

<h2>Input Jajan</h2>

<div id="loginArea">
<button onclick="login()">Login Admin</button>
</div>

<div id="formArea" style="display:none">
<button onclick="logout()">Logout</button>

<label>Jenis</label>
<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<label>Tempat</label>
<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div class="row"><span>Cilok</span><input type="number" id="cilok"></div>

<button onclick="kirim()">Simpan</button>
</div>

</div>

<!-- LAPORAN -->
<div id="laporanTab" style="display:none">
<h2>Laporan</h2>
<div id="listLaporan">Loading...</div>
</div>

</div>
</div>

<script>

const ADMIN_EMAIL = "noor.jadzil@gmail.com";

// TAB
function showTab(tab,e){
document.getElementById("inputTab").style.display = tab==="input"?"block":"none";
document.getElementById("laporanTab").style.display = tab==="laporan"?"block":"none";

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

if(tab==="laporan") loadLaporan();
}

// LOGIN (FIX REDIRECT)
function login(){
const provider = new firebase.auth.GoogleAuthProvider();
firebase.auth().signInWithRedirect(provider);
}

// HANDLE REDIRECT RESULT
firebase.auth().getRedirectResult()
.then(result=>{
if(result.user){
console.log("Login sukses:", result.user.email);
}
}).catch(err=>{
console.error("Error login:", err);
});

// LOGOUT
function logout(){
firebase.auth().signOut();
}

// PERSISTENT LOGIN
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// CEK LOGIN
firebase.auth().onAuthStateChanged(user=>{
if(user && user.email===ADMIN_EMAIL){
document.getElementById("loginArea").style.display="none";
document.getElementById("formArea").style.display="block";
}else{
document.getElementById("loginArea").style.display="block";
document.getElementById("formArea").style.display="none";
}
});

// KIRIM
function kirim(){

let user = firebase.auth().currentUser;

if(!user || user.email!==ADMIN_EMAIL){
alert("Bukan admin!");
return;
}

let data={
waktu:new Date().toLocaleString("sv-SE",{timeZone:"Asia/Jakarta"}),
jenis:document.getElementById("jenis").value,
tempat:document.getElementById("tempat").value,
cilok:document.getElementById("cilok").value
};

db.ref("jajan").push(data);
alert("Berhasil");
}

// LAPORAN
function loadLaporan(){

let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

let arr=Object.values(snap.val()).reverse();

arr.forEach(d=>{
let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<b>${d.jenis} - ${d.tempat}</b><br>
<small>${d.waktu}</small><br>
Cilok: ${d.cilok}
`;

list.appendChild(div);
});

});
}

</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyAIEhd42LiAEu7CzsnTXubQdxH1dzu1nyQ",
authDomain:"cilok-86ced.firebaseapp.com",
databaseURL:"https://cilok-86ced-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"cilok-86ced"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
</script>

</body>
</html>
