<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<style>
body{
font-family: 'Segoe UI', Arial, sans-serif;
color:#0f172a;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:15px;
color:#1e3a8a;
font-weight:800;
letter-spacing:0.5px;
}

label{
font-weight:700;
font-size:13px;
color:#334155;
margin-top:8px;
display:block;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #cbd5f5;
margin-bottom:15px;
font-size:16px;
font-weight:600;
color:#1e293b;
background:#f8fafc;
}

.table{
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}

.row:last-child{
border:none;
}

.item{
font-size:15px;
color:#0f172a;
font-weight:600;
}

input{
width:80px;
padding:8px;
border-radius:10px;
border:1px solid #cbd5f5;
text-align:center;
font-size:16px;
font-weight:600;
color:#1e293b;
background:#f8fafc;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:linear-gradient(135deg,#1e3a8a,#3b82f6);
color:white;
border:none;
border-radius:12px;
margin-top:20px;
font-weight:700;
letter-spacing:0.5px;
transition:0.2s;
box-shadow:0 6px 15px rgba(30,58,138,0.3);
}

button:active{
transform:scale(0.97);
}

button:disabled{
background:gray;
}

</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>Input Jajan</h2>

<label>Jenis</label>
<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<label>Tempat</label>
<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div class="table">

<div class="row">
<span class="item">Tahu Batagor</span>
<input type="number" id="tahu_batagor">
</div>

<div class="row">
<span class="item">Cilok</span>
<input type="number" id="cilok">
</div>

<div class="row">
<span class="item">Cimol Cireng</span>
<input type="number" id="cimol_cireng">
</div>

<div class="row">
<span class="item">Kripik Kolek</span>
<input type="number" id="kripik_kolek">
</div>

<div class="row">
<span class="item">Piscok Molen</span>
<input type="number" id="piscok_molen">
</div>

<div class="row">
<span class="item">Dimsum Maklor Moci</span>
<input type="number" id="dimsum_maklor_moci">
</div>

<div class="row">
<span class="item">Kebab</span>
<input type="number" id="kebab">
</div>

<div class="row">
<span class="item">Sosis Roti Gurita</span>
<input type="number" id="sosis_roti_gurita">
</div>

</div>

<button id="tombol" onclick="kirim()">Simpan</button>

</div>
</div>

<script>

async function kirim(){

  const tombol = document.getElementById("tombol");

  if(tombol.disabled) return;

  tombol.innerText = "Mengirim...";
  tombol.disabled = true;

  const tempat = document.getElementById("tempat").value;
  const jenis = document.getElementById("jenis").value;

  const items = [
    {barang:"Tahu Batagor", jumlah: document.getElementById("tahu_batagor").value},
    {barang:"Cilok", jumlah: document.getElementById("cilok").value},
    {barang:"Cimol Cireng", jumlah: document.getElementById("cimol_cireng").value},
    {barang:"Kripik Kolek", jumlah: document.getElementById("kripik_kolek").value},
    {barang:"Piscok Molen", jumlah: document.getElementById("piscok_molen").value},
    {barang:"Dimsum Maklor Moci", jumlah: document.getElementById("dimsum_maklor_moci").value},
    {barang:"Kebab", jumlah: document.getElementById("kebab").value},
    {barang:"Sosis Roti Gurita", jumlah: document.getElementById("sosis_roti_gurita").value}
  ];

  try{

    // kirim SEMUA DATA SEKALIGUS (tidak satu-satu)
await fetch("https://script.google.com/macros/s/AKfycbzvF8R3gHR3MGTAWSXg20HbyofvBYEP92H_jfXyGxDKhWW50hn3T5-DsHUEmTTAbxQcbg/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    waktu: new Date().toLocaleString(),
    tempat: tempat,
    jenis: jenis,
    items: items
  })
});

    // simpan ke Firebase satu per satu (biar tetap realtime)
    for(let item of items){

      let jumlah = Number(item.jumlah);

      if(!jumlah || jumlah <= 0) continue;

      await db.ref("jajan").push({
        waktu: new Date().toLocaleString(),
        tempat: tempat,
        barang: item.barang,
        jumlah: jumlah,
        jenis: jenis
      });

    }

    alert("✅ Data berhasil terkirim!");

  }catch(err){
    console.log(err);
    alert("❌ Gagal kirim data!");
  }

  tombol.innerText = "Simpan";
  tombol.disabled = false;

  kosongkan();

}

function kosongkan(){

  document.getElementById("tahu_batagor").value="";
  document.getElementById("cilok").value="";
  document.getElementById("cimol_cireng").value="";
  document.getElementById("kripik_kolek").value="";
  document.getElementById("piscok_molen").value="";
  document.getElementById("dimsum_maklor_moci").value="";
  document.getElementById("kebab").value="";
  document.getElementById("sosis_roti_gurita").value="";

}

</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</body>
</html>
