<script>
async function kirim(){

  const tombol = document.getElementById("tombol");

  if(tombol.disabled) return;

  tombol.disabled = true;
  tombol.innerText = "Mengirim...";

  const tempat = document.getElementById("tempat").value;
  const jenis = document.getElementById("jenis").value;

  const items = [
    {barang: "Tahu Batagor", jumlah: document.getElementById("tahu_batagor").value},
    {barang: "Cilok", jumlah: document.getElementById("cilok").value},
    {barang: "Cimol Cireng", jumlah: document.getElementById("cimol_cireng").value},
    {barang: "Kripik Kolek", jumlah: document.getElementById("kripik_kolek").value},
    {barang: "Piscok Molen", jumlah: document.getElementById("piscok_molen").value},
    {barang: "Dimsum Maklor Moci", jumlah: document.getElementById("dimsum_maklor_moci").value},
    {barang: "Kebab", jumlah: document.getElementById("kebab").value},
    {barang: "Sosis Roti Gurita", jumlah: document.getElementById("sosis_roti_gurita").value}
  ];

  try{

    const res = await fetch("https://script.google.com/macros/s/AKfycbzvF8R3gHR3MGTAWSXg20HbyofvBYEP92H_jfXyGxDKhWW50hn3T5-DsHUEmTTAbxQcbg/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        waktu: new Date().toLocaleString(),
        tempat: tempat,
        jenis: jenis,
        items: items
      })
    });

    const text = await res.text();

    console.log(text);

    if(text === "OK"){
      alert("✅ Data berhasil dikirim!");
    } else {
      alert("⚠️ Server merespon tapi tidak OK");
    }

  }catch(err){
    console.log(err);
    alert("❌ Gagal kirim data! Cek koneksi atau script");
  }

  tombol.disabled = false;
  tombol.innerText = "Simpan";

  kosongkan();

}
</script>
