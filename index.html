<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
.tabs{
display:flex;
background:#1e3a8a;
}

.tab-btn{
flex:1;
padding:15px;
border:none;
background:transparent;
color:white;
font-weight:700;
cursor:pointer;
}

.tab-btn.active{
background:#3b82f6;
}

body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#1e3a8a;
}

select,input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.row input{
width:80px;
}

button{
width:100%;
padding:15px;
background:#3b82f6;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="tabs">
<button class="tab-btn active" onclick="bukaTab('input')">Input</button>
<button class="tab-btn" onclick="bukaTab('laporan')">Laporan</button>
</div>

<div class="container">

<!-- INPUT -->
<div id="input">
<div class="card">

<h2>Input Jajan</h2>

<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div class="row"><span>Tahu Batagor</span><input id="tahu"></div>
<div class="row"><span>Cilok</span><input id="cilok"></div>
<div class="row"><span>Cimol</span><input id="cimol"></div>
<div class="row"><span>Kripik</span><input id="kripik"></div>
<div class="row"><span>Piscok</span><input id="piscok"></div>
<div class="row"><span>Dimsum</span><input id="dimsum"></div>
<div class="row"><span>Kebab</span><input id="kebab"></div>
<div class="row"><span>Sosis</span><input id="sosis"></div>

<button id="tombol" onclick="kirim()">Simpan</button>

</div>
</div>

<!-- LAPORAN -->
<div id="laporanTab" style="display:none;">
<div class="card">
<h2>Laporan</h2>
<div id="laporan"></div>
</div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
function bukaTab(nama){
document.getElementById("input").style.display="none";
document.getElementById("laporanTab").style.display="none";

if(nama==="input"){
document.getElementById("input").style.display="block";
}else{
document.getElementById("laporanTab").style.display="block";
}

document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

const firebaseConfig={
apiKey:"AIzaSyAIEhd42LiAEu7CzsnTXubQdxH1dzu1nyQ",
authDomain:"cilok-86ced.firebaseapp.com",
databaseURL:"https://cilok-86ced-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"cilok-86ced"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

async function kirim(){

let tombol=document.getElementById("tombol");
if(tombol.disabled)return;

tombol.innerText="Mengirim...";
tombol.disabled=true;

let data={
waktu:new Date().toLocaleString("sv-SE",{timeZone:"Asia/Jakarta"}),
tempat:tempat.value,
jenis:jenis.value,
items:[
{barang:"Tahu",jumlah:tahu.value},
{barang:"Cilok",jumlah:cilok.value},
{barang:"Cimol",jumlah:cimol.value},
{barang:"Kripik",jumlah:kripik.value},
{barang:"Piscok",jumlah:piscok.value},
{barang:"Dimsum",jumlah:dimsum.value},
{barang:"Kebab",jumlah:kebab.value},
{barang:"Sosis",jumlah:sosis.value}
]
};

try{
await db.ref("jajan").push(data);
alert("Berhasil");
}catch(e){
alert("Gagal: "+e.message);
}

tombol.innerText="Simpan";
tombol.disabled=false;
}

db.ref("jajan").limitToLast(20).on("value",snap=>{

let ikhwan="<h3>Ikhwan</h3>";
let akhwat="<h3>Akhwat</h3>";

snap.forEach(c=>{
let d=c.val();

let isi="<small>"+d.waktu+"</small>";

d.items.forEach(i=>{
if(i.jumlah && i.jumlah!=0){
isi+="<p>"+i.barang+" : "+i.jumlah+"</p>";
}
});

if(d.tempat=="Ikhwan") ikhwan+=isi;
else akhwat+=isi;
});

laporan.innerHTML=ikhwan+"<hr>"+akhwat;

});
</script>

</body>
</html>
