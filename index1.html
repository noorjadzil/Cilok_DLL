<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAQSHOF</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
min-height:100vh;
color:white;
overflow-x:hidden;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#2563eb55,transparent 35%),
radial-gradient(circle at bottom right,#06b6d455,transparent 35%),
linear-gradient(135deg,#020617,#0f172a,#111827);
z-index:-2;
}

.blur1,
.blur2{
position:fixed;
border-radius:50%;
filter:blur(90px);
z-index:-1;
}

.blur1{
width:250px;
height:250px;
background:#2563eb55;
top:-50px;
left:-50px;
}

.blur2{
width:250px;
height:250px;
background:#06b6d455;
bottom:-50px;
right:-50px;
}

.header{
padding:30px 20px 10px;
text-align:center;
}

.logo{
font-size:34px;
font-weight:900;
letter-spacing:4px;
background:linear-gradient(90deg,#60a5fa,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
margin-top:8px;
font-size:14px;
color:#94a3b8;
}

.container{
max-width:480px;
margin:auto;
padding:15px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:22px;
box-shadow:
0 10px 40px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.05);
}

.section-title{
font-size:13px;
font-weight:700;
letter-spacing:1px;
color:#94a3b8;
margin-bottom:10px;
margin-top:20px;
text-transform:uppercase;
}

.input-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-size:13px;
font-weight:700;
color:#cbd5e1;
}

select,
textarea,
input[type="number"],
input[type="file"]{
width:100%;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:15px;
font-size:15px;
color:white;
outline:none;
transition:0.25s;
}

select:focus,
textarea:focus,
input:focus{
border-color:#38bdf8;
box-shadow:0 0 0 4px rgba(56,189,248,0.15);
}

option{
background:#0f172a;
}

textarea{
resize:none;
min-height:100px;
}

.item-row{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.item-row select{
flex:2;
}

.item-row input{
flex:1;
text-align:center;
}

button{
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:20px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:0.25s;
color:white;
}

.primary-btn{
background:linear-gradient(135deg,#2563eb,#06b6d4);
box-shadow:0 10px 30px rgba(37,99,235,0.35);
}

.secondary-btn{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
}

.add-btn{
background:rgba(255,255,255,0.08);
border:1px dashed rgba(255,255,255,0.2);
}

img{
width:100%;
border-radius:22px;
margin-top:12px;
display:none;
border:1px solid rgba(255,255,255,0.08);
}

.crop-area{
display:none;
margin-top:12px;
}

.crop-area img{
display:block;
max-height:360px;
object-fit:contain;
}

.small-btn{
background:linear-gradient(135deg,#16a34a,#22c55e);
box-shadow:0 10px 30px rgba(22,163,74,0.25);
}

.info{
font-size:12px;
color:#94a3b8;
line-height:1.5;
margin-top:6px;
}

.toast{
position:fixed;
left:50%;
bottom:24px;
transform:translateX(-50%) translateY(20px);
background:rgba(15,23,42,0.92);
border:1px solid rgba(255,255,255,0.12);
color:white;
padding:13px 16px;
border-radius:16px;
box-shadow:0 14px 40px rgba(0,0,0,0.35);
opacity:0;
pointer-events:none;
transition:0.25s;
z-index:99;
font-size:14px;
font-weight:700;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.footer{
text-align:center;
padding:25px;
font-size:12px;
color:#64748b;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="blur1"></div>
<div class="blur2"></div>

<div class="header">
<div class="logo">MAQSHOF</div>
<div class="sub">Smart Data Management System</div>
</div>

<div class="container">

<div class="card">

<div class="section-title">Upload</div>

<div class="input-group">
<label>Foto</label>
<input type="file" id="foto" accept="image/*" capture="environment">
<div class="info">Ambil foto langsung dari kamera, lalu bisa dipotong agar pas.</div>

<div class="crop-area" id="cropArea">
<img id="preview">
<button class="small-btn" type="button" onclick="pakaiHasilCrop()">✅ Pakai Foto Ini</button>
</div>
</div>

<div class="section-title">Informasi</div>

<div class="input-group">
<label>Jenis Data</label>
<select id="jenis">
<option value="Masuk">Masuk</option>
<option value="Sisa">Sisa</option>
</select>
</div>

<div class="input-group">
<label>Lokasi</label>
<select id="tempat" disabled>
<option selected>Akhwat</option>
</select>
</div>

<div class="section-title">Input Item</div>

<div id="itemsContainer"></div>

<button class="add-btn" onclick="tambahDropdown()">
＋ Tambah Item
</button>

<div class="section-title">Catatan</div>

<div class="input-group">
<textarea id="catatan" placeholder="Tambahkan catatan tambahan..."></textarea>
</div>

<button class="primary-btn" onclick="kirim()">
💾 Simpan & Kirim WhatsApp
</button>

<button class="secondary-btn" onclick="location.href='laporan.html'">
📊 Laporan
</button>

<button class="secondary-btn" onclick="location.href='setting.html'">
⚙️ Pengaturan
</button>

</div>

<div class="footer">
MAQSHOF • Modern Dashboard System
</div>

</div>

<div class="toast" id="toast">Berhasil</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>

let daftarItems=[];
let cropper=null;
let fotoBase64Final="";

// TOAST
function showToast(teks){
let toast=document.getElementById("toast");
toast.textContent=teks;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2200);
}

// PREVIEW FOTO + CROP
document.getElementById("foto").addEventListener("change",function(){

let file=this.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=e=>{

let preview=document.getElementById("preview");
preview.src=e.target.result;
document.getElementById("cropArea").style.display="block";

if(cropper){
cropper.destroy();
}

cropper=new Cropper(preview,{
aspectRatio:NaN,
viewMode:1,
autoCropArea:1,
background:false
});

};

reader.readAsDataURL(file);

});

function pakaiHasilCrop(){

if(!cropper) return;

let canvas=cropper.getCroppedCanvas({
width:600,
imageSmoothingQuality:"high"
});

fotoBase64Final=canvas.toDataURL("image/jpeg",0.6);

let preview=document.getElementById("preview");
preview.src=fotoBase64Final;

cropper.destroy();
cropper=null;

showToast("Foto siap digunakan");

}

// LOAD ITEMS
function loadItems(){

db.ref("items").once("value",snap=>{

daftarItems=[];

let dataItems=[];

snap.forEach(c=>{

let data=c.val();
let nama=data.nama || data;
let urutan=data.urutan || 9999;

dataItems.push({nama,urutan});

});

dataItems.sort((a,b)=>a.urutan-b.urutan);

daftarItems=dataItems.map(i=>i.nama);

let container=document.getElementById("itemsContainer");

container.innerHTML="";

// LANGSUNG 8 DROPDOWN
for(let i=0;i<8;i++){

tambahDropdown();

}

});

}

// TAMBAH DROPDOWN
function tambahDropdown(){

let container=document.getElementById("itemsContainer");

let div=document.createElement("div");

div.className="item-row";

let options='<option value="">Pilih Item</option>';

daftarItems.forEach(item=>{

options += `<option value="${item}">${item}</option>`;

});

div.innerHTML=`

<select class="barang">
${options}
</select>

<input 
type="number"
class="jumlah"
placeholder="0"
inputmode="numeric">

`;

container.appendChild(div);

}

// FORMAT TANGGAL
function formatTanggal(){

let hari=["Ahad","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];

let bulan=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

let d=new Date();

return `${hari[d.getDay()]}, ${d.getDate()} ${bulan[d.getMonth()]}`;

}

// SIMPAN
async function kirim(){

let items=[];

// ITEM
document.querySelectorAll(".item-row").forEach(row=>{

let barang=row.querySelector(".barang").value;

let jumlah=row.querySelector(".jumlah").value;

if(barang && jumlah && jumlah!=0){

items.push({
barang:barang,
jumlah:Number(jumlah)
});

}

});

if(items.length===0){
showToast("Isi minimal 1 item dulu");
return;
}

// FOTO
let fotoBase64=fotoBase64Final;

if(!fotoBase64){

let f=document.getElementById("foto").files[0];

if(f){
fotoBase64=await kompresGambar(f);
}

}

// DATA
let data={

waktu:new Date().toISOString(),

tempat:document.getElementById("tempat").value,

jenis:document.getElementById("jenis").value,

items:items,

catatan:document.getElementById("catatan").value,

foto:fotoBase64

};

await db.ref("jajan").push(data);

let teks=formatTanggal()+"\n";
teks += `${data.jenis} - ${data.tempat}\n\n`;

data.items.forEach(i=>{

teks += `${i.barang} : ${i.jumlah}\n`;

});

if(data.catatan){

teks += `\nCatatan:\n${data.catatan}\n`;

}

teks += "\n— MAQSHOF —";

// LANGSUNG SHARE KE WHATSAPP / PILIH APLIKASI
if(navigator.share){

try{

let shareData={
title:"Laporan MAQSHOF",
text:teks
};

if(fotoBase64){

let fileFoto=dataURLtoFile(fotoBase64,"foto-maqshof.jpg");

if(navigator.canShare && navigator.canShare({files:[fileFoto]})){
shareData.files=[fileFoto];
}

}

await navigator.share(shareData);

}catch(err){
console.log("Share dibatalkan",err);
}

}else{

let url=`https://wa.me/?text=${encodeURIComponent(teks)}`;

window.open(url,"_blank");

}

showToast("Data berhasil disimpan");

setTimeout(()=>{
location.reload();
},700);

}

// KOMPRES FOTO
function kompresGambar(file){

return new Promise(resolve=>{

let reader=new FileReader();

reader.onload=e=>{

let img=new Image();

img.src=e.target.result;

img.onload=()=>{

let canvas=document.createElement("canvas");

let lebar=400;
let scale=lebar/img.width;

canvas.width=lebar;

canvas.height=img.height*scale;

let ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve(canvas.toDataURL("image/jpeg",0.5));

};

};

reader.readAsDataURL(file);

});

}

function dataURLtoFile(dataurl, filename){

let arr=dataurl.split(",");
let mime=arr[0].match(/:(.*?);/)[1];
let bstr=atob(arr[1]);
let n=bstr.length;
let u8arr=new Uint8Array(n);

while(n--){
u8arr[n]=bstr.charCodeAt(n);
}

return new File([u8arr],filename,{type:mime});

}

</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

firebase.initializeApp({

databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"

});

const db=firebase.database();

window.onload=function(){

loadItems();

}

</script>

</body>
</html>
